name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare dist
        run: |
          mkdir -p dist
          cp index.html dist/
          cp quiz-italiano.html dist/
          cp quiz-espanol.html dist/
          cp quiz-anglais.html dist/
          cp apple-touch-icon.png dist/
          cp icon-192.png dist/
          cp icon-512.png dist/

      - name: Push dist/ to deploy branch
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: deploy
          folder: dist
          clean: true
