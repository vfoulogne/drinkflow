<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Quiz Español - vocabulario</title>
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #f4f3ee;
    color: #2c2c2a;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    padding: 0;
  }
  .app {
    width: 100%;
    max-width: 480px;
    min-height: 100vh;
    background: #ffffff;
    display: flex;
    flex-direction: column;
    padding: 20px 20px 32px;
  }
  header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 8px;
  }
  header h1 {
    font-size: 15px;
    font-weight: 600;
    margin: 0;
    color: #5f5e5a;
  }
  .score-pill {
    font-size: 13px;
    background: #fdeeee;
    color: #8c2f2f;
    padding: 4px 10px;
    border-radius: 20px;
    font-weight: 600;
  }
  .progress-track {
    height: 5px;
    background: #eceae2;
    border-radius: 3px;
    overflow: hidden;
    margin: 14px 0 24px;
  }
  .progress-fill {
    height: 100%;
    width: 0%;
    background: #d96b4f;
    transition: width .25s ease;
  }
  .card {
    background: #faf9f5;
    border: 1px solid #e5e3d8;
    border-radius: 18px;
    padding: 32px 22px;
    text-align: center;
    flex-grow: 0;
  }
  .direction-badge {
    display: inline-block;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: .02em;
    padding: 5px 14px;
    border-radius: 20px;
    background: #fdf0e1;
    color: #7a4a12;
    margin-bottom: 18px;
  }
  .word {
    font-size: 26px;
    font-weight: 600;
    line-height: 1.3;
    margin-bottom: 24px;
    word-break: break-word;
  }
  input#answer {
    width: 100%;
    font-size: 17px;
    padding: 13px 14px;
    border-radius: 12px;
    border: 1.5px solid #d3d1c7;
    outline: none;
    text-align: center;
    background: #fff;
  }
  input#answer:focus {
    border-color: #d96b4f;
  }
  .feedback {
    min-height: 22px;
    font-size: 14px;
    font-weight: 600;
    margin-top: 14px;
  }
  .feedback.correct { color: #3b6d11; }
  .feedback.wrong { color: #993c1d; }
  .feedback.neutral { color: #888780; }
  .btn-row {
    display: flex;
    gap: 10px;
    margin-top: 20px;
  }
  button {
    flex: 1;
    font-size: 15px;
    font-weight: 600;
    padding: 14px 10px;
    border-radius: 12px;
    border: none;
    cursor: pointer;
    -webkit-appearance: none;
  }
  .btn-primary {
    background: #8c2f2f;
    color: #fff;
  }
  .btn-secondary {
    background: #eceae2;
    color: #444441;
  }
  .btn-primary:disabled {
    background: #e3bcbc;
    color: #fff;
  }
  .bottom-actions {
    display: flex;
    gap: 10px;
    margin-top: 14px;
  }
  .end-screen {
    text-align: center;
    padding: 40px 10px;
  }
  .end-screen .big {
    font-size: 40px;
    font-weight: 700;
    margin-bottom: 6px;
    color: #8c2f2f;
  }
  .end-screen p {
    color: #5f5e5a;
    font-size: 15px;
    margin-bottom: 28px;
  }
  .review-list {
    text-align: left;
    background: #faf9f5;
    border: 1px solid #e5e3d8;
    border-radius: 14px;
    padding: 14px 16px;
    margin-bottom: 24px;
    max-height: 220px;
    overflow-y: auto;
  }
  .review-list div {
    font-size: 13px;
    padding: 6px 0;
    border-bottom: 1px solid #eeeeee;
    color: #5f5e5a;
  }
  .review-list div:last-child { border-bottom: none; }
  .review-list span.w { color: #2c2c2a; font-weight: 600; }
  footer {
    text-align: center;
    font-size: 12px;
    color: #b4b2a9;
    margin-top: auto;
    padding-top: 24px;
  }
</style>
</head>
<body>
<div class="app">
  <header>
    <h1 id="header-label">Palabra 1 / 30</h1>
    <div style="display:flex;align-items:center;gap:8px">
      <button id="restart-top-btn" style="font-size:12px;font-weight:600;padding:5px 10px;border-radius:20px;border:none;background:#eceae2;color:#444441;flex:none">&#8635; Reiniciar</button>
      <div class="score-pill" id="score-pill">0 / 0</div>
    </div>
  </header>
  <div class="progress-track"><div class="progress-fill" id="progress"></div></div>

  <div id="quiz-view">
    <div class="card">
      <div class="direction-badge" id="direction-badge">francés &rarr; español</div>
      <div class="word" id="word-display">palabra</div>
      <input type="text" id="answer" placeholder="Tu traducción" autocomplete="off" autocapitalize="off" autocorrect="off" spellcheck="false" />
      <div class="feedback neutral" id="feedback"></div>
    </div>
    <div class="btn-row">
      <button class="btn-secondary" id="dontknow-btn">No lo sé</button>
      <button class="btn-primary" id="check-btn">Verificar</button>
    </div>
    <div class="bottom-actions">
      <button class="btn-secondary" id="next-btn" disabled style="flex:1">Siguiente &rarr;</button>
    </div>
  </div>

  <div id="end-view" class="end-screen" style="display:none">
    <div class="big" id="final-score">0/30</div>
    <p>Puntuación final de esta serie</p>
    <div class="review-list" id="review-list"></div>
    <button class="btn-primary" id="restart-btn" style="width:100%">Nueva serie de 30 palabras</button>
  </div>

  <footer>Banco de más de 300 palabras &middot; 30 palabras por sesión, elegidas al azar</footer>
</div>

let sessionWords = [];
let current = 0;
let score = 0;
let wrongList = [];

function shuffle(arr){
  const a = arr.slice();
  for(let i = a.length - 1; i > 0; i--){
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function normalize(s){
  return s.toLowerCase()
    .replace(/ñ/g, '')
    .normalize('NFD').replace(/[̀-ͯ]/g,'')
    .replace(//g, 'ñ')
    .replace(/\([^)]*\)/g,'')
    .split('/')[0]
    .replace(/^(el |la |los |las |un |una |unos |unas )/,'')
    .replace(/^(le |la |l'|les |un |une |des )/,'')
    .replace(/[.,!?¿¡]/g,'')
    .trim();
}

function pickSession(){
  const indices = shuffle([...Array(bank.length).keys()]).slice(0, 30);
  sessionWords = indices;
  current = 0;
  score = 0;
  wrongList = [];
  document.getElementById('quiz-view').style.display = 'block';
  document.getElementById('end-view').style.display = 'none';
  showWord();
}

function showWord(){
  const wIdx = sessionWords[current];
  const pair = bank[wIdx];
  document.getElementById('header-label').textContent = 'Palabra ' + (current + 1) + ' / 30';
  document.getElementById('score-pill').textContent = score + ' / ' + current;
  document.getElementById('progress').style.width = Math.round((current / 30) * 100) + '%';
  document.getElementById('direction-badge').textContent = 'francés → español';
  document.getElementById('word-display').textContent = pair[1];
  const input = document.getElementById('answer');
  input.value = '';
  input.disabled = false;
  document.getElementById('feedback').textContent = '';
  document.getElementById('feedback').className = 'feedback neutral';
  document.getElementById('next-btn').disabled = true;
  document.getElementById('check-btn').disabled = false;
  input.focus();
}

function checkAnswer(){
  const input = document.getElementById('answer');
  if(input.disabled) return;
  const wIdx = sessionWords[current];
  const pair = bank[wIdx];
  const expectedRaw = pair[0];
  const userVal = normalize(input.value);
  const accepted = expectedRaw.split('/').map(s => normalize(s));
  const correct = userVal.length > 0 && accepted.includes(userVal);
  input.disabled = true;
  document.getElementById('next-btn').disabled = false;
  document.getElementById('check-btn').disabled = true;
  const fb = document.getElementById('feedback');
  if(correct){
    score++;
    fb.textContent = '¡Correcto!';
    fb.className = 'feedback correct';
  } else {
    fb.textContent = 'Respuesta: ' + expectedRaw;
    fb.className = 'feedback wrong';
    wrongList.push(pair);
  }
  document.getElementById('score-pill').textContent = score + ' / ' + (current + 1);
}

function dontKnow(){
  const input = document.getElementById('answer');
  if(input.disabled) return;
  const wIdx = sessionWords[current];
  const pair = bank[wIdx];
  const expectedRaw = pair[0];
  input.disabled = true;
  document.getElementById('next-btn').disabled = false;
  document.getElementById('check-btn').disabled = true;
  wrongList.push(pair);
  const fb = document.getElementById('feedback');
  fb.textContent = 'Respuesta: ' + expectedRaw;
  fb.className = 'feedback neutral';
  document.getElementById('score-pill').textContent = score + ' / ' + (current + 1);
}

function nextWord(){
  current++;
  if(current >= 30){
    document.getElementById('final-score').textContent = score + '/30';
    const list = document.getElementById('review-list');
    if(wrongList.length === 0){
      list.innerHTML = '<div>¡Todas correctas, enhorabuena!</div>';
    } else {
      list.innerHTML = wrongList.map(p => '<div><span class="w">' + p[1] + '</span> &mdash; ' + p[0] + '</div>').join('');
    }
    document.getElementById('quiz-view').style.display = 'none';
    document.getElementById('end-view').style.display = 'block';
  } else {
    showWord();
  }
}

document.getElementById('check-btn').addEventListener('click', checkAnswer);
document.getElementById('dontknow-btn').addEventListener('click', dontKnow);
document.getElementById('next-btn').addEventListener('click', nextWord);
document.getElementById('restart-btn').addEventListener('click', pickSession);
document.getElementById('restart-top-btn').addEventListener('click', function(){
  if(confirm('¿Reiniciar desde cero? Se perderá el progreso actual.')){
    pickSession();
  }
});
document.getElementById('answer').addEventListener('keydown', function(e){
  if(e.key === 'Enter'){
    if(!document.getElementById('answer').disabled){
      checkAnswer();
    } else {
      nextWord();
    }
  }
});

pickSession();
