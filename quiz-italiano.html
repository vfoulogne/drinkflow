<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Quiz Italiano - 500 parole</title>
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #f4f3ee;
    color: #2c2c2a;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    padding: 0;
  }
  .app {
    width: 100%;
    max-width: 480px;
    min-height: 100vh;
    background: #ffffff;
    display: flex;
    flex-direction: column;
    padding: 20px 20px 32px;
  }
  header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 8px;
  }
  header h1 {
    font-size: 15px;
    font-weight: 600;
    margin: 0;
    color: #5f5e5a;
  }
  .score-pill {
    font-size: 13px;
    background: #eeedfe;
    color: #3c3489;
    padding: 4px 10px;
    border-radius: 20px;
    font-weight: 600;
  }
  .progress-track {
    height: 5px;
    background: #eceae2;
    border-radius: 3px;
    overflow: hidden;
    margin: 14px 0 24px;
  }
  .progress-fill {
    height: 100%;
    width: 0%;
    background: #7f77dd;
    transition: width .25s ease;
  }
  .card {
    background: #faf9f5;
    border: 1px solid #e5e3d8;
    border-radius: 18px;
    padding: 32px 22px;
    text-align: center;
    flex-grow: 0;
  }
  .direction-badge {
    display: inline-block;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: .02em;
    padding: 5px 14px;
    border-radius: 20px;
    background: #e1f5ee;
    color: #085041;
    margin-bottom: 18px;
  }
  .word {
    font-size: 26px;
    font-weight: 600;
    line-height: 1.3;
    margin-bottom: 24px;
    word-break: break-word;
  }
  input#answer {
    width: 100%;
    font-size: 17px;
    padding: 13px 14px;
    border-radius: 12px;
    border: 1.5px solid #d3d1c7;
    outline: none;
    text-align: center;
    background: #fff;
  }
  input#answer:focus {
    border-color: #7f77dd;
  }
  .feedback {
    min-height: 22px;
    font-size: 14px;
    font-weight: 600;
    margin-top: 14px;
  }
  .feedback.correct { color: #3b6d11; }
  .feedback.wrong { color: #993c1d; }
  .feedback.neutral { color: #888780; }
  .btn-row {
    display: flex;
    gap: 10px;
    margin-top: 20px;
  }
  button {
    flex: 1;
    font-size: 15px;
    font-weight: 600;
    padding: 14px 10px;
    border-radius: 12px;
    border: none;
    cursor: pointer;
    -webkit-appearance: none;
  }
  .btn-primary {
    background: #26215c;
    color: #fff;
  }
  .btn-secondary {
    background: #eceae2;
    color: #444441;
  }
  .btn-primary:disabled {
    background: #cecbf6;
    color: #fff;
  }
  .bottom-actions {
    display: flex;
    gap: 10px;
    margin-top: 14px;
  }
  .end-screen {
    text-align: center;
    padding: 40px 10px;
  }
  .end-screen .big {
    font-size: 40px;
    font-weight: 700;
    margin-bottom: 6px;
    color: #26215c;
  }
  .end-screen p {
    color: #5f5e5a;
    font-size: 15px;
    margin-bottom: 28px;
  }
  .review-list {
    text-align: left;
    background: #faf9f5;
    border: 1px solid #e5e3d8;
    border-radius: 14px;
    padding: 14px 16px;
    margin-bottom: 24px;
    max-height: 220px;
    overflow-y: auto;
  }
  .review-list div {
    font-size: 13px;
    padding: 6px 0;
    border-bottom: 1px solid #eeeeee;
    color: #5f5e5a;
  }
  .review-list div:last-child { border-bottom: none; }
  .review-list span.w { color: #2c2c2a; font-weight: 600; }
  footer {
    text-align: center;
    font-size: 12px;
    color: #b4b2a9;
    margin-top: auto;
    padding-top: 24px;
  }
</style>
</head>
<body>
<div class="app">
  <header>
    <h1 id="header-label">Parola 1 / 30</h1>
    <div style="display:flex;align-items:center;gap:8px">
      <button id="restart-top-btn" style="font-size:12px;font-weight:600;padding:5px 10px;border-radius:20px;border:none;background:#eceae2;color:#444441;flex:none">&#8635; Ricomincia</button>
      <div class="score-pill" id="score-pill">0 / 0</div>
    </div>
  </header>
  <div class="progress-track"><div class="progress-fill" id="progress"></div></div>

  <div id="quiz-view">
    <div class="card">
      <div class="direction-badge" id="direction-badge">italiano &rarr; francese</div>
      <div class="word" id="word-display">parola</div>
      <input type="text" id="answer" placeholder="La tua traduzione" autocomplete="off" autocapitalize="off" autocorrect="off" spellcheck="false" />
      <div class="feedback neutral" id="feedback"></div>
    </div>
    <div class="btn-row">
      <button class="btn-secondary" id="dontknow-btn">Non lo so</button>
      <button class="btn-primary" id="check-btn">Verifica</button>
    </div>
    <div class="bottom-actions">
      <button class="btn-secondary" id="next-btn" disabled style="flex:1">Avanti &rarr;</button>
    </div>
  </div>

  <div id="end-view" class="end-screen" style="display:none">
    <div class="big" id="final-score">0/30</div>
    <p>Punteggio finale su questa serie</p>
    <div class="review-list" id="review-list"></div>
    <button class="btn-primary" id="restart-btn" style="width:100%">Nuova serie di 30 parole</button>
  </div>

  <footer>Banca di oltre 1000 parole &middot; 30 parole per sessione, tirate a sorte</footer>
</div>

let sessionWords = [];
let current = 0;
let score = 0;
let wrongList = [];

function shuffle(arr){
  const a = arr.slice();
  for(let i = a.length - 1; i > 0; i--){
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function normalize(s){
  return s.toLowerCase()
    .normalize('NFD').replace(/[\u0300-\u036f]/g,'')
    .replace(/\([^)]*\)/g,'')
    .split('/')[0]
    .replace(/^(il |lo |la |l'|i |gli |le |un |uno |una )/,'')
    .replace(/^(le |la |l'|les |un |une |des )/,'')
    .replace(/[.,!?]/g,'')
    .trim();
}

function pickSession(){
  const indices = shuffle([...Array(bank.length).keys()]).slice(0, 30);
  sessionWords = indices;
  current = 0;
  score = 0;
  wrongList = [];
  document.getElementById('quiz-view').style.display = 'block';
  document.getElementById('end-view').style.display = 'none';
  showWord();
}

function showWord(){
  const wIdx = sessionWords[current];
  const pair = bank[wIdx];
  document.getElementById('header-label').textContent = 'Parola ' + (current + 1) + ' / 30';
  document.getElementById('score-pill').textContent = score + ' / ' + current;
  document.getElementById('progress').style.width = Math.round((current / 30) * 100) + '%';
  document.getElementById('direction-badge').textContent = 'francese \u2192 italiano';
  document.getElementById('word-display').textContent = pair[1];
  const input = document.getElementById('answer');
  input.value = '';
  input.disabled = false;
  document.getElementById('feedback').textContent = '';
  document.getElementById('feedback').className = 'feedback neutral';
  document.getElementById('next-btn').disabled = true;
  document.getElementById('check-btn').disabled = false;
  input.focus();
}

function checkAnswer(){
  const input = document.getElementById('answer');
  if(input.disabled) return;
  const wIdx = sessionWords[current];
  const pair = bank[wIdx];
  const expectedRaw = pair[0];
  const userVal = normalize(input.value);
  const accepted = expectedRaw.split('/').map(s => normalize(s));
  const correct = userVal.length > 0 && accepted.includes(userVal);
  input.disabled = true;
  document.getElementById('next-btn').disabled = false;
  document.getElementById('check-btn').disabled = true;
  const fb = document.getElementById('feedback');
  if(correct){
    score++;
    fb.textContent = 'Corretto!';
    fb.className = 'feedback correct';
  } else {
    fb.textContent = 'Risposta: ' + expectedRaw;
    fb.className = 'feedback wrong';
    wrongList.push(pair);
  }
  document.getElementById('score-pill').textContent = score + ' / ' + (current + 1);
}

function dontKnow(){
  const input = document.getElementById('answer');
  if(input.disabled) return;
  const wIdx = sessionWords[current];
  const pair = bank[wIdx];
  const expectedRaw = pair[0];
  input.disabled = true;
  document.getElementById('next-btn').disabled = false;
  document.getElementById('check-btn').disabled = true;
  wrongList.push(pair);
  const fb = document.getElementById('feedback');
  fb.textContent = 'Risposta: ' + expectedRaw;
  fb.className = 'feedback neutral';
  document.getElementById('score-pill').textContent = score + ' / ' + (current + 1);
}

function nextWord(){
  current++;
  if(current >= 30){
    document.getElementById('final-score').textContent = score + '/30';
    const list = document.getElementById('review-list');
    if(wrongList.length === 0){
      list.innerHTML = '<div>Tutte corrette, complimenti!</div>';
    } else {
      list.innerHTML = wrongList.map(p => '<div><span class="w">' + p[1] + '</span> &mdash; ' + p[0] + '</div>').join('');
    }
    document.getElementById('quiz-view').style.display = 'none';
    document.getElementById('end-view').style.display = 'block';
  } else {
    showWord();
  }
}

document.getElementById('check-btn').addEventListener('click', checkAnswer);
document.getElementById('dontknow-btn').addEventListener('click', dontKnow);
document.getElementById('next-btn').addEventListener('click', nextWord);
document.getElementById('restart-btn').addEventListener('click', pickSession);
document.getElementById('restart-top-btn').addEventListener('click', function(){
  if(confirm('Ricominciare da zero? Il progresso attuale andrà perso.')){
    pickSession();
  }
});
document.getElementById('answer').addEventListener('keydown', function(e){
  if(e.key === 'Enter'){
    if(!document.getElementById('answer').disabled){
      checkAnswer();
    } else {
      nextWord();
    }
  }
});

pickSession();
